<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PomPom - Ma Liste</title>
    
    <!-- Meta tags pour le mode Application "native" sur iPhone (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PomPom">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/415/415733.png">

    <!-- Chargement des bibliothèques via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK pour la synchro iCloud -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #F2F2F7;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        /* Masquer la barre de défilement pour un look plus "App" native */
        ::-webkit-scrollbar { display: none; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJET.firebaseapp.com",
            projectId: "TON_PROJET_ID",
            storageBucket: "TON_PROJET.appspot.com",
            messagingSenderId: "TON_ID",
            appId: "TON_APP_ID"
        };

        let db = null;
        let auth = null;
        if (firebaseConfig.apiKey !== "TON_API_KEY") {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        }

        const App = () => {
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [user, setUser] = useState(null);
            const listEndRef = useRef(null);

            const Icon = ({ name, size = 20, className = "" }) => {
                const icons = {
                    trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />,
                    check: <path d="M20 6 9 17l-5-5" />,
                    up: <path d="m5 12 7-7 7 7M12 19V5" />,
                    cloud: <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.4-1.8-4.3-4.1-4.5C17.1 6.8 14.1 4 10.5 4 7.2 4 4.5 6.4 4.1 9.6 2.2 10.4 1 12.3 1 14.5 1 17.5 3.5 20 6.5 20h11" />
                };
                return (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        {icons[name]}
                    </svg>
                );
            };

            useEffect(() => {
                if (!auth) {
                    const saved = localStorage.getItem('pompom_local');
                    if (saved) setItems(JSON.parse(saved));
                    return;
                }
                auth.signInAnonymously().catch(console.error);
                const unsubscribeAuth = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        const unsubscribeData = db.collection('items').where('userId', '==', u.uid)
                            .onSnapshot(snap => setItems(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                        return () => unsubscribeData();
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!auth) localStorage.setItem('pompom_local', JSON.stringify(items));
            }, [items]);

            const addItem = async (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;
                const newItem = { text: inputValue.trim(), checked: false, createdAt: Date.now(), userId: user?.uid || 'local' };
                if (db && user) await db.collection('items').add(newItem);
                else setItems([...items, { ...newItem, id: Date.now() }]);
                setInputValue('');
                setTimeout(() => listEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
            };

            const toggleItem = async (item) => {
                if (db && user) await db.collection('items').doc(item.id).update({ checked: !item.checked });
                else setItems(items.map(i => i.id === item.id ? { ...i, checked: !item.checked } : i));
            };

            const deleteItem = async (id) => {
                if (db && user) await db.collection('items').doc(id).delete();
                else setItems(items.filter(i => i.id !== id));
            };

            const clear = async () => {
                const toDelete = items.filter(i => i.checked);
                if (db && user) {
                    const batch = db.batch();
                    toDelete.forEach(i => batch.delete(db.collection('items').doc(i.id)));
                    await batch.commit();
                } else setItems(items.filter(i => !i.checked));
            };

            const sortedItems = [...items].sort((a, b) => {
                if (a.checked === b.checked) return a.createdAt - b.createdAt;
                return a.checked ? 1 : -1;
            });

            const FunnyAppleLogo = () => (
                <svg width="42" height="42" viewBox="0 0 100 100">
                    <defs>
                        <mask id="biteMask">
                            <rect width="100%" height="100%" fill="white" />
                            <circle cx="95" cy="50" r="18" fill="black" />
                            <circle cx="85" cy="32" r="12" fill="black" />
                            <circle cx="85" cy="68" r="12" fill="black" />
                        </mask>
                    </defs>
                    <path d="M48 28 Q 45 15 55 10" stroke="#8B4513" strokeWidth="4" fill="none" />
                    <path d="M52 25 C 65 10, 85 15, 75 30 C 65 40, 45 35, 52 25 Z" fill="#34C759" />
                    <g mask="url(#biteMask)">
                        <path d="M50 90 C 20 90, 10 60, 20 40 C 25 30, 40 30, 50 40 C 60 30, 75 30, 80 40 C 90 60, 80 90, 50 90 Z" fill="#FF3B30" />
                        <circle cx="35" cy="55" r="4.5" fill="#1C1C1E" />
                        <circle cx="55" cy="55" r="4.5" fill="#1C1C1E" />
                        <path d="M35 65 Q 45 78 55 65" stroke="#1C1C1E" strokeWidth="3" fill="none" />
                        <circle cx="25" cy="62" r="5" fill="#FF8A8A" opacity="0.6" />
                        <circle cx="65" cy="62" r="5" fill="#FF8A8A" opacity="0.6" />
                    </g>
                </svg>
            );

            return (
                <div className="h-screen w-full flex justify-center items-center">
                    <div className="w-full h-screen sm:h-[800px] sm:max-w-[400px] bg-[#F2F2F7] sm:rounded-[3.5rem] sm:shadow-2xl sm:border-[10px] sm:border-black flex flex-col relative overflow-hidden">
                        <header className="pt-[env(safe-area-inset-top,3.5rem)] pb-4 px-6 ios-blur bg-[#F2F2F7]/80 border-b border-gray-200/50 flex items-center justify-between sticky top-0 z-20">
                            <div className="flex items-center gap-3">
                                <FunnyAppleLogo />
                                <div>
                                    <h1 className="text-2xl font-extrabold tracking-tight text-black leading-tight">PomPom</h1>
                                    <p className="text-[#8E8E93] text-[10px] font-black uppercase tracking-widest flex items-center gap-1">
                                        <Icon name="cloud" size={10} className={user ? "text-[#34C759]" : "text-gray-400"} /> 
                                        {user ? "Cloud Actif" : "Stockage Local"}
                                    </p>
                                </div>
                            </div>
                            {items.some(i => i.checked) && (
                                <button onClick={clear} className="text-[#FF3B30] font-bold text-sm bg-white px-4 py-2 rounded-full active:scale-95 shadow-sm border border-gray-100 transition-all">Vider</button>
                            )}
                        </header>
                        <main className="flex-1 overflow-y-auto px-4 py-4 space-y-3 pb-40">
                            {items.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-[#8E8E93] space-y-6 opacity-80 pt-10">
                                    <div className="animate-bounce"><FunnyAppleLogo /></div>
                                    <div className="text-center">
                                        <p className="text-lg font-bold text-black">J'ai faim !</p>
                                        <p className="text-sm">Ajoute tes premiers articles.</p>
                                    </div>
                                </div>
                            ) : (
                                <ul className="space-y-2">
                                    {sortedItems.map((item) => (
                                        <li key={item.id} className={`flex items-center justify-between p-4 rounded-2xl transition-all duration-300 ${item.checked ? 'opacity-40' : 'bg-white shadow-sm border border-transparent active:scale-[0.97]'}`} onClick={() => toggleItem(item)}>
                                            <div className="flex items-center gap-4 flex-1 overflow-hidden cursor-pointer">
                                                <div className={`w-6 h-6 rounded-full flex items-center justify-center transition-all duration-300 ${item.checked ? 'bg-[#FF3B30] scale-110' : 'border-2 border-[#D1D1D6]'}`}>
                                                    {item.checked && <Icon name="check" size={14} className="text-white" />}
                                                </div>
                                                <span className={`text-[17px] truncate font-bold ${item.checked ? 'line-through text-[#8E8E93]' : 'text-black'}`}>{item.text}</span>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); deleteItem(item.id); }} className="p-2 text-[#D1D1D6] hover:text-[#FF3B30] active:scale-125 transition-transform">
                                                <Icon name="trash" size={18}/>
                                            </button>
                                        </li>
                                    ))}
                                    <div ref={listEndRef} />
                                </ul>
                            )}
                        </main>
                        <div className="absolute bottom-0 w-full ios-blur bg-[#F2F2F7]/90 border-t border-gray-200/50 px-4 pt-4 pb-[env(safe-area-inset-bottom,2.5rem)]">
                            <form onSubmit={addItem} className="flex items-center bg-white rounded-2xl shadow-sm border border-gray-200/50 p-1.5 focus-within:shadow-md transition-all">
                                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="J'ai besoin de..." className="flex-1 bg-transparent text-[17px] outline-none px-3 py-2.5 font-bold placeholder:text-[#C7C7CC] text-black" />
                                <button type="submit" disabled={!inputValue.trim()} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-300 ${inputValue.trim() ? 'bg-[#FF3B30] text-white shadow-lg' : 'bg-[#F2F2F7] text-[#C7C7CC]'}`}>
                                    <Icon name="up" size={22} />
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
